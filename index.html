<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOS Burgers Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container login-container d-flex flex-column flex-lg-row">
        <div class="col-lg-6 login-content">
            <h1 class="fw-bold">MOS BURGERS</h1>
            <h2 class="fs-4">Welcome Back</h2>
            <p>Sign in with your email address and password</p>
            <form>
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-signin w-100">Sign in</button>
                <p class="mt-3 text-center">
                    Don't have an account? <a href="#" class="link-signup">Sign Up</a>
                </p>
            </form>
        </div>

        <div class="col-lg-6 login-image"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
