<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOS Burgers Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            
            <div class="col-lg-2 col-md-3 sidebar">
                <input type="button" value="Home" class="btn-with-icon"><i class="fa fa-home"></i>
                <input type="button" value="Search" class="btn-with-icon"><i class="fa fa-search"></i>
                <input type="button" value="Update" class="btn-with-icon"><i class="fa fa-edit"></i>
            </div>

            <div class="col-lg-7 col-md-6">
                <div class="main-content">
                    
                    <div class="mb-4">
                        <button class="btn btn-outline-primary me-2">All Items</button>
                        <button class="btn btn-outline-primary me-2">Burgers</button>
                        <button class="btn btn-outline-primary me-2">Beverages</button>
                        <button class="btn btn-outline-primary">Desserts</button>
                    </div>

                    <div class="row">
                        <div class="col-lg-3 col-md-4 col-sm-6">
                            <div class="card">
                                <img src="images/LoginImage.jpg" class="card-img-top" alt="Item Image">
                                <div class="card-body text-center">
                                    <h5 class="card-title">Item Name</h5>
                                    <p class="card-text">Item Price</p>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-3 col-md-4 col-sm-6">
                            <div class="card">
                                <img src="images/LoginImage.jpg" class="card-img-top" alt="Item Image">
                                <div class="card-body text-center">
                                    <h5 class="card-title">Item Name</h5>
                                    <p class="card-text">Item Price</p>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-3 col-md-4 col-sm-6">
                            <div class="card">
                                <img src="images/LoginImage.jpg" class="card-img-top" alt="Item Image">
                                <div class="card-body text-center">
                                    <h5 class="card-title">Item Name</h5>
                                    <p class="card-text">Item Price</p>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-3 col-md-4 col-sm-6">
                            <div class="card">
                                <img src="images/LoginImage.jpg" class="card-img-top" alt="Item Image">
                                <div class="card-body text-center">
                                    <h5 class="card-title">Item Name</h5>
                                    <p class="card-text">Item Price</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-center mt-4">
                        <button class="btn btn-secondary me-2">&lt;</button>
                        <button class="btn btn-secondary">&gt;</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-3" id="orderPlace">
                <div>
                    <button class="btn btn-outline-primary me-2">Log out</button>
                    <button class="btn btn-outline-primary">Cashier 01</button>
                </div>
                <div>
                    <h2>Place Order</h2>
                    <div class="d-flex align-items-center mb-3">
                        <p class="me-2">Veggie Burger</p>
                        <button>+</button>
                        <input type="text" value="1">
                        <button>-</button>
                        <p class="ms-2">Price: $10</p>
                    </div>
                    <div>
                        <p>Discount: <strong>10%</strong></p>
                    </div>
                    <div>
                        <h2>Total: $9</h2>
                        <button class="btn btn-success">Pay</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
