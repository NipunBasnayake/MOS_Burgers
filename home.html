<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOS Burgers Home</title>

    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link
        href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&family=Koulen&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>
    <div class="container-fluid">
        <div class="row">


            <!-- ------------------------------ Left Sidebar ------------------------------ -->

            <div class="col-lg-2 col-md-3 col-sm-12 sidebar">
                <div class="sidebar-header">
                    <h1 id="MosBurger"><span id="MOSpart" style="color: rgb(255, 0, 0);">MOS </span>BURGERS</h1>
                </div>
                <div class="sidebar-items">
                    <div class="sidebar-item">
                        <button class="btn btn-secondary mb-3">
                            <i class="fa fa-home"></i> Home
                        </button>
                    </div>
                    <div class="sidebar-item">
                        <button class="btn btn-secondary mb-3">
                            <i class="fa fa-search"></i> Search Order
                        </button>
                    </div>
                    <div class="sidebar-item">
                        <button class="btn btn-secondary mb-3">
                            <i class="fa fa-edit"></i> Update
                        </button>
                    </div>
                </div>
                <div class="sidebar-account">
                    <div class="sidebar-item">
                        <button class="btn btn-secondary mb-3">
                            <i class="bi bi-person-circle"></i> Cashier 01
                        </button>
                    </div>
                    <div class="sidebar-item">
                        <button class="btn btn-secondary mb-3" onclick="window.location.href='index.html'">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </div>
                </div>
            </div>


            <!-- ------------------------------ Content ------------------------------ -->

            <div class="col-lg-7 col-md-6 col-sm-12">
                <div class="main-content">

                    <div class="filter-buttons mb-4">
                        <button class="me-2">
                            <i class="fas fa-box-open"></i> All Items
                        </button>
                        <button class="me-2">
                            <i class="fas fa-hamburger"></i> Burgers
                        </button>
                        <button class="me-2">
                            <i class="fas fa-cocktail"></i> Beverages
                        </button>
                        <button class="me-2">
                            <i class="fas fa-ice-cream"></i> Desserts
                        </button>
                    </div>


                    <div class="row pt-1" id="scrollableDiv">

                        <div class="col-lg-3 col-md-4 col-sm-6 mb-3">
                            <div class="card">
                                <img src="images/LoginImage.jpg" class="card-img-top" alt="Item Image">
                                <div class="card-body">
                                    <h5 class="card-title">Item Name</h5>
                                    <p class="card-text">$10</p>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>
            </div>


            <!-- ------------------------------Right Sidebar (Place Order Section) ------------------------------ -->

            <div class="col-lg-3 col-md-3 col-sm-12 sidebar-right">

                <h2 id="orderPlaceHeader">Place Order</h2>
                <hr id="placeHr">

                <!-- Order Item Section -->
                <div id="ordersFlow">

                    <div class="order-item">
                        <button id="btn-close" aria-label="Close" class="btn-close">&times;</button>
                        <div class="order-item-details">
                            <p class="item-name">Veggie Burger</p>
                            <div class="quantity-controls d-flex align-items-center">
                                <input type="button" class="quantity-btn" value="-" onclick="button2()" />
                                <input type="text" id="output-area" value="1" readonly />
                                <input type="button" class="quantity-btn" value="+" onclick="button1()" />
                                <p class="price position-absolute top-1 end-0 me-5">$100</p>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Order Summary Section -->
                <div class="orderSummery">
                    <p>Discount: <strong>10%</strong></p>
                    <div class="orderTotal d-flex align-items-center justify-content-between p-3" onclick="yourFunction()">
                        <h2 class="mb-0">Pay</h2>
                        <h2 class="mb-0">Total: $9</h2>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="home.js"></script>
</body>

</html>
